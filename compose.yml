services:
  web:
    container_name: odoo_web
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
    volumes:
      -./config:/etc/odoo
      -./addons:/mnt/extra-addons
  db:
    container_name: odoo_db
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo